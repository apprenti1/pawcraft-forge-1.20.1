<div class="home-page">

  <div class="wiki-header">
    <div class="wiki-header-top">
      <div class="wiki-logo-paw"><img src="../icon.png" alt="Pawcraft icon"></div>
      <div>
        <div class="wiki-pack-name">PAW<span>CRAFT</span></div>
        <div class="wiki-pack-sub">Modpack Minecraft</div>
      </div>
    </div>
    <div class="meta-chips">
      <span class="chip"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Minecraft 1.20.1</span>
      <span class="chip"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Forge 1.20.1</span>
      <span class="chip"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>32 mods</span>
    </div>
  </div>

  <div class="card">
    <div id="login-choices">
      <div class="choice-cards">
        <button class="choice-card" id="btn-choice-offline">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <div class="choice-card-title">Sans compte</div>
          <div class="choice-card-sub">Mode hors ligne</div>
        </button>
        <button class="choice-card" id="btn-choice-ms">
          <img src="icons/ms-logo.svg" class="ms-logo-sm" alt="Microsoft">
          <div class="choice-card-title">Compte Microsoft</div>
          <div class="choice-card-sub">Xbox Live requis</div>
        </button>
      </div>
      <div id="offline-form" class="hidden" style="margin-top:10px">
        <div class="input-row">
          <input id="input-username" type="text" placeholder="Votre pseudo" maxlength="16" autocomplete="off">
          <button id="btn-login-offline" class="btn btn-accent">OK</button>
        </div>
      </div>
    </div>
    <div id="player-info" class="player-info hidden">
      <div class="player-avatar-wrap"><img id="player-avatar" class="player-avatar" alt="Avatar"></div>
      <div>
        <div class="player-connected-label">Connecté</div>
        <div id="auth-label" class="player-name"></div>
      </div>
    </div>
  </div>

  <div id="banner-launcher" class="update-banner hidden">
    <div class="update-banner-text">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Nouveau launcher — <strong id="launcher-version"></strong></span>
    </div>
    <button id="btn-update-launcher" class="btn btn-accent btn-sm">Télécharger</button>
  </div>

  <div class="card hidden" id="card-progress">
    <p id="progress-label">Préparation…</p>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="log-box" class="log-box"></div>
  </div>

  <div class="play-zone">
    <button id="btn-play" class="btn-play" disabled>JOUER</button>
    <p id="play-hint" class="play-hint"></p>
    <button id="btn-reinstall" class="btn-reinstall">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Réinstaller
    </button>
  </div>

</div>
